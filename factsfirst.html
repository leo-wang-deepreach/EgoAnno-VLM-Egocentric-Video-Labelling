<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>egoanno · facts-first</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#0b0e13;--line:#272e3a;--txt:#e6edf3;
        --mut:#8b949e;--L:#3fb950;--R:#58a6ff;--acc:#d29922;--na:#6e7681;--good:#2ea043;--bad:#da3633}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:13.5px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  header{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.3px}
  select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font:inherit;max-width:62vw}
  optgroup{color:var(--acc);font-weight:700} option{color:var(--txt);font-weight:400}
  label.sel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);display:inline-flex;align-items:center;gap:6px}
  label.sel select{text-transform:none;letter-spacing:0;color:var(--txt)}
  .pill{font-size:12px;padding:2px 9px;border-radius:999px;background:#21262d;border:1px solid var(--line);color:var(--mut)}
  .pill b{color:var(--txt)} .pill.good b{color:var(--good)} .pill.bad b{color:var(--acc)}
  /* VERTICAL layout: single column (no left/right split of the page) */
  .wrap{display:flex;flex-direction:column;gap:16px;padding:16px 18px;max-width:1100px;margin:0 auto}
  .leftcol{position:static;max-height:none;overflow:visible}
  video{width:100%;border-radius:10px;background:#000;display:block}
  .goal{color:var(--mut);font-size:13px;margin:8px 2px 0}
  /* the two HANDS stay side-by-side (left=left, right=right) */
  .now{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .hand{padding:10px 13px;border-radius:10px;background:var(--panel);border:1px solid var(--line);min-height:58px}
  .hand .tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
  .hand .lab{font-size:17px;font-weight:600;margin-top:3px}
  .hand.L{border-left:3px solid var(--L)} .hand.L .tag{color:var(--L)}
  .hand.R{border-left:3px solid var(--R)} .hand.R .tag{color:var(--R)}
  .lab.na{color:var(--na);font-style:italic;font-weight:500}
  .tl{position:relative;height:42px;margin-top:12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer}
  .seg{position:absolute;top:0;bottom:0;border-right:1px solid var(--panel2);opacity:.85}
  .seg.cur{outline:2px solid var(--acc);outline-offset:-2px;opacity:1;z-index:2}
  .seg span{position:absolute;left:3px;top:2px;right:2px;font-size:10px;color:#fff;font-weight:700;
            white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px #000,0 0 2px #000}
  .ph{position:absolute;top:0;bottom:0;width:2px;background:#fff;z-index:3;pointer-events:none}
  section{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--panel);overflow:hidden}
  section>h2{margin:0;padding:9px 13px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#1b212b}
  section>h2 .sub{color:var(--mut);font-weight:400;letter-spacing:0;text-transform:none;font-size:12px}
  .body{padding:10px 13px}
  .body.collapsed{display:none}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  td,th{padding:4px 7px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  tr.cur{background:#1d2530}
  .t{color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ll{color:var(--L)} .rr{color:var(--R)} .ll.na,.rr.na{color:var(--na);font-style:italic}
  .prov{font-size:10px;color:var(--mut)}
  .row-click{cursor:pointer}
  code{background:#21262d;padding:1px 5px;border-radius:5px;font-size:12px}
  .kv{color:var(--mut)} .kv b{color:var(--txt);font-weight:600}
  .chip{display:inline-block;font-size:11px;padding:1px 7px;border-radius:999px;border:1px solid var(--line);margin:2px 3px 0 0;color:var(--mut)}
  .flag{color:var(--acc)} .empty{color:var(--mut);font-style:italic}
  .think{color:var(--mut);font-size:12px}
  .legend span{display:inline-block;margin-right:10px;font-size:11px;color:var(--mut)}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:3px}
  .iobar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 9px;font-size:11px}
  .iobar span{padding:2px 8px;border-radius:6px;border:1px solid var(--line);color:var(--mut);background:#11161d}
  .iobar .io-fps{background:#1b212b;color:var(--acc);font-variant-numeric:tabular-nums}
  .iobar b{color:var(--txt);font-weight:600;margin-right:4px}
</style>
</head>
<body>
<header>
  <h1>egoanno · facts-first</h1>
  <label class="sel">clip <select id="pick" title="grouped by version — newest version at the top"></select></label>
  <span class="pill">dir <b id="dir">—</b></span>
  <span class="pill">segments <b id="nseg">—</b></span>
  <span class="pill">dur <b id="dur">—</b></span>
  <span class="pill" id="qpill">qa <b id="nqa">—</b></span>
  <span class="pill" id="gpill">gate <b id="gv">—</b></span>
  <span class="pill" id="fpill">flow <b id="flow">—</b></span>
</header>

<div class="wrap">
  <div class="leftcol">
    <video id="vid" controls preload="auto"></video>
    <div class="goal" id="goal"></div>
    <div class="now">
      <div class="hand L"><div class="tag">Left hand</div><div class="lab" id="curL">—</div></div>
      <div class="hand R"><div class="tag">Right hand</div><div class="lab" id="curR">—</div></div>
    </div>
    <div class="tl" id="tl"><div class="ph" id="phh" style="left:0"></div></div>
    <div class="legend" style="margin-top:7px" id="legend"></div>
  </div>

  <div id="panels"></div>
</div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const isNA=s=>!s||String(s).trim().toUpperCase()==='N/A';
const f1=t=>(+t).toFixed(1)+'s';
const PROV={dense_grid:'#30363d',transition:'#1f6feb',measured_transition:'#1f6feb',
  measured_action:'#238636',v49_segment:'#238636',combed:'#8957e5',seg_reconcile:'#8957e5',
  gate_seam_merge:'#d29922',fresh_eye:'#db61a2',global_audit_gpt:'#db61a2',
  segment:'#30363d',cycle_template:'#30363d'};
const shortLab=s=>{const r=(!s.right||/^n\/a$/i.test(s.right))?s.left:s.right;
  return isNA(r)?'·':String(r).split(/\s+/).slice(0,2).join(' ');};
const verNum=v=>{const m=String(v).match(/\d+/);return m?+m[0]:0;};
// the new measured-spine pipeline is labelled v2/v3 (low numbers, but NEWEST in time) —
// rank single-digit versions as the most recent so they sit at the TOP of the dropdown.
const verRank=v=>{const n=verNum(v);return n<10?1000+n:n;};
let EP=null,SEGS=[],DUR=0,CLIPS=[];

async function loadManifest(){
  let mani={clips:[]};
  try{ mani=await (await fetch('factsfirst_manifest.json?_='+Date.now())).json(); }catch(e){}
  CLIPS=mani.clips||[];
  const vs=new Set(); CLIPS.forEach(c=>(c.versions||[]).forEach(v=>vs.add(v.ver)));
  const allVers=[...vs].sort((a,b)=>verRank(b)-verRank(a));        // newest version group first
  const pick=$('#pick');
  if(!allVers.length){ pick.innerHTML='<option>no episodes yet</option>'; return; }
  // ONE dropdown, like /viewer/: an <optgroup> per version (newest at top), clips inside.
  pick.innerHTML=allVers.map(ver=>{
    const opts=CLIPS.map((c,i)=>({c,i})).filter(o=>(o.c.versions||[]).some(v=>v.ver===ver))
      .map(o=>`<option value="${o.i}|${ver}">${esc(o.c.clip)}</option>`).join('');
    return `<optgroup label="${esc(ver)}">${opts}</optgroup>`;
  }).join('');
  pick.onchange=()=>loadSel();
  loadSel();                                                       // newest version, first clip
}

function loadSel(){
  const val=$('#pick').value; if(!val||val.indexOf('|')<0) return;
  const [i,ver]=val.split('|');
  const c=CLIPS[+i]; if(!c) return;
  const v=(c.versions||[]).find(x=>x.ver===ver) || (c.versions||[]).slice(-1)[0];
  if(v) loadClip(v);
}

async function loadClip(c){
  EP=await (await fetch(c.episode+'?_='+Date.now())).json();
  SEGS=EP.segments||[];
  $('#dir').textContent=EP.direction||'—';
  $('#nseg').textContent=SEGS.length;
  $('#dur').textContent=f1(EP.duration_sec||0);
  const qn=(EP._qa&&EP._qa.violations?EP._qa.violations.length:(EP._qa||[]).length);
  $('#nqa').textContent=qn; $('#qpill').className='pill'+(qn?' bad':' good');
  $('#gv').textContent=EP._gate_quality||EP._purpose_verdict||'—';
  const lean=!(EP._contact_frames&&EP._contact_frames.length);
  $('#flow').textContent=lean?'lean (default)':'facts-first';
  $('#fpill').className='pill'+(lean?' good':'');
  $('#goal').innerHTML='<b>Goal:</b> '+esc(EP.goal||'');
  const v=$('#vid'); v.src=c.video; v.load();
  buildTimeline(); buildPanels();
  v.ontimeupdate=tick; v.onloadedmetadata=()=>{DUR=v.duration||EP.duration_sec;};
}

function buildTimeline(){
  const tl=$('#tl'), total=EP.duration_sec||1;
  tl.querySelectorAll('.seg').forEach(e=>e.remove());
  SEGS.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='seg'; d.dataset.i=i;
    d.style.left=(100*s.start_sec/total)+'%'; d.style.width=(100*(s.end_sec-s.start_sec)/total)+'%';
    d.style.background=PROV[s.boundary_provenance]||'#30363d';
    d.innerHTML='<span>'+(i+1)+' '+esc(shortLab(s))+'</span>';
    d.title=`#${i+1} [${f1(s.start_sec)}-${f1(s.end_sec)}]\nL: ${s.left}\nR: ${s.right}`;
    d.onclick=()=>{$('#vid').currentTime=s.start_sec+0.02;};
    tl.appendChild(d);
  });
  tl.onclick=e=>{ if(e.target.classList.contains('seg'))return;
    const r=tl.getBoundingClientRect(); $('#vid').currentTime=(e.clientX-r.left)/r.width*(EP.duration_sec||0); };
  const seen=[...new Set(SEGS.map(s=>s.boundary_provenance))];
  $('#legend').innerHTML=seen.map(p=>`<span><i class="sw" style="background:${PROV[p]||'#30363d'}"></i>${esc(p)}</span>`).join('');
}

const STEPMETA={
 '0' :{fps:'source fps',inp:'raw video → handpose YOLO (green=L / blue=R circles)',out:'overlaid video → clock → seen by EVERY stage'},
 '4' :{fps:'10 fps',inp:'measured segments + per-hand facts + object inventory + rotation',out:'per-hand atomic labels'},
 '5' :{fps:'2 fps',inp:'whole-clip frames + timeline (opus)',out:'corrections + quality verdict'},
};
function sect(title,sub,inner,open){
  const key=(title.match(/Step\s+([0-9][a-z]?)/)||[])[1];
  const m=key&&STEPMETA[key]; let bar='';
  if(m){ sub=(sub?sub+' · ':'')+m.fps;
    bar=`<div class="iobar"><span class="io-in"><b>in</b> ${esc(m.inp)}</span><span class="io-out"><b>out</b> ${esc(m.out)}</span><span class="io-fps">${esc(m.fps)}</span></div>`; }
  return `<section><h2 onclick="this.nextElementSibling.classList.toggle('collapsed')">
    <span>${title}</span><span class="sub">${sub||''}</span></h2>
    <div class="body${open?'':' collapsed'}">${bar}${inner}</div></section>`;
}

function buildPanels(){
  const flagsBy={}; (EP._flags||[]).forEach(f=>{(flagsBy[f.seg]=flagsBy[f.seg]||[]).push(f);});
  const segRows=SEGS.map((s,i)=>{
    const fl=(flagsBy[i+1]||[]).map(f=>`⚑${esc(f.type)}`).join(' ');
    return `<tr class="row-click" data-i="${i}" onclick="document.getElementById('vid').currentTime=${s.start_sec}+0.02">
      <td class="t">#${i+1}<br>${f1(s.start_sec)}<br>${f1(s.end_sec)}</td>
      <td><div class="ll ${isNA(s.left)?'na':''}">L · ${esc(s.left)}</div>
          <div class="rr ${isNA(s.right)?'na':''}">R · ${esc(s.right)}</div>
          <div class="prov">${esc(s.boundary_provenance)}${fl?' · <span class=flag>'+fl+'</span>':''}</div></td></tr>`;
  }).join('');
  const objs=EP.objects||[];
  const qa=(EP._qa&&EP._qa.violations)||EP._qa||[];

  let html='';
  html+=sect('Step 0 · hand-circle overlay (green=L / blue=R)','burned into the working video',
    `<div class="kv">The clip runs through the fine-tuned YOLOv8m-pose hand detector; each hand gets a coloured circle — <b style="color:var(--L)">green = LEFT</b>, <b style="color:var(--R)">blue = RIGHT</b>. The crops the labeler sees carry this so left/right is <b>measured</b>, not guessed.</div>`, false);
  html+=sect('Objects · scene inventory',objs.length+' objects',
    `<div class="kv">${objs.length?objs.map(o=>`<span class="chip">${esc(o.name)}</span>`).join(''):'<span class=empty>none</span>'}</div>`, false);
  html+=sect('Step 3 · direction',EP.direction||'—',
    `<div class="kv"><b>direction:</b> ${esc(EP.direction)} · <b>goal:</b> ${esc(EP.goal)}</div>`, false);
  html+=sect('Step 4 · segments + labels (result)',SEGS.length+' segments',
    `<table><thead><tr><th>seg</th><th>left / right · origin</th></tr></thead><tbody id="segbody">${segRows}</tbody></table>`,true);
  html+=sect('Step 4d · cross-check flags',(EP._flags||[]).length+' flags',
    (EP._flags||[]).length?'<table>'+(EP._flags||[]).map(f=>`<tr><td class="t">seg#${f.seg}</td><td><b>${esc(f.type)}</b> <span class=prov>(${esc(f.raised_by)})</span><br>${esc(f.detail)}</td></tr>`).join('')+'</table>':'<div class="empty">none</div>');
  html+=sect('Step 5 · gate + QA','',
    `<div class="kv"><b>findings:</b> ${esc(EP._gate_findings)||'<span class=empty>none</span>'}</div>
     <div class="kv" style="margin-top:7px"><b>QA (${qa.length}):</b></div>
     ${qa.length?'<table>'+qa.map(v=>`<tr><td class="t">seg#${v.seg}</td><td>${esc(v.code)} · ${esc(v.hand)} — ${esc(v.detail)}</td></tr>`).join('')+'</table>':'<div class="empty">no deterministic conflicts</div>'}`);
  $('#panels').innerHTML=html;
}

function curSeg(t){ return SEGS.findIndex(s=>t>=s.start_sec-1e-3&&t<s.end_sec); }
function tick(){
  const v=$('#vid'),t=v.currentTime,total=EP.duration_sec||v.duration||1,i=curSeg(t),s=SEGS[i];
  $('#phh').style.left=(100*t/total)+'%';
  const L=$('#curL'),R=$('#curR');
  L.textContent=s?s.left:'—'; L.className='lab'+(s&&isNA(s.left)?' na':'');
  R.textContent=s?s.right:'—'; R.className='lab'+(s&&isNA(s.right)?' na':'');
  document.querySelectorAll('.tl .seg').forEach(e=>e.classList.toggle('cur',+e.dataset.i===i));
  document.querySelectorAll('#segbody tr').forEach(e=>e.classList.toggle('cur',+e.dataset.i===i));
}
loadManifest();
</script>
</body>
</html>
